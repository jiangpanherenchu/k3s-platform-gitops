apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: messaging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jiangpanherenchu/k3s-platform-gitops.git
    targetRevision: main
    path: messaging
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
