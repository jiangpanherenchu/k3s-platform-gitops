apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scheduler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jiangpanherenchu/k3s-platform-gitops.git
    targetRevision: main
    path: scheduler
  destination:
    server: https://kubernetes.default.svc
    namespace: scheduler
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
