apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
      - name: emqx
        image: emqx/emqx:latest
        ports:
        - containerPort: 1883
        - containerPort: 18083
        - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: emqx-service
  namespace: messaging
spec:
  type: NodePort
  selector:
    app: emqx
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883
    nodePort: 31883
  - name: dashboard
    port: 18083
    targetPort: 18083
    nodePort: 30083
  - name: websocket
    port: 8083
    targetPort: 8083
    nodePort: 30084
