apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastdds-discovery
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastdds-discovery
  template:
    metadata:
      labels:
        app: fastdds-discovery
    spec:
      containers:
      - name: fastdds-discovery
        image: debian:bullseye-slim
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        args:
        - |
          apt-get update &&
          apt-get install -y --no-install-recommends fastdds-tools ca-certificates &&
          rm -rf /var/lib/apt/lists/* &&
          fastdds discovery -l 0.0.0.0 -p 11811
        ports:
        - name: discovery
          containerPort: 11811
          protocol: UDP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fastdds-discovery-service
  namespace: messaging
spec:
  type: NodePort
  selector:
    app: fastdds-discovery
  ports:
  - name: discovery-udp
    port: 11811
    targetPort: 11811
    protocol: UDP
    nodePort: 31811
