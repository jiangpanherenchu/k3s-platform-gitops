apiVersion: v1
kind: Namespace
metadata:
  name: scheduler
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k3s-control-api
  namespace: scheduler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k3s-control-api-role
rules:
- apiGroups: [""]
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups: [""]
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
- apiGroups: [""]
  resources:
  - namespaces
  verbs:
  - get
  - list
  - create
- apiGroups: ["apps"]
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups: ["batch"]
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k3s-control-api-rolebinding
subjects:
- kind: ServiceAccount
  name: k3s-control-api
  namespace: scheduler
roleRef:
  kind: ClusterRole
  name: k3s-control-api-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-control-api
  namespace: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k3s-control-api
  template:
    metadata:
      labels:
        app: k3s-control-api
    spec:
      serviceAccountName: k3s-control-api
      containers:
      - name: k3s-control-api
        image: registry.local:30500/k3s-control-api:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: GIN_MODE
          value: release
        ports:
        - name: http
          containerPort: 8088
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k3s-control-api-service
  namespace: scheduler
spec:
  type: NodePort
  selector:
    app: k3s-control-api
  ports:
  - name: http
    port: 8088
    targetPort: 8088
    protocol: TCP
    nodePort: 30088
